name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.platform }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'
        platform:
          - 'linux/amd64'
          - 'linux/arm64'
          - 'darwin/arm64'
          - 'windows/amd64'
        include:
          - platform: 'linux/amd64'
            runs-on: ubuntu-24.04
          - platform: 'linux/arm64'
            runs-on: ubuntu-24.04-arm
          - platform: 'darwin/arm64'
            runs-on: macos-15
          - platform: 'windows/amd64'
            runs-on: windows-2025

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project
        run: |
          uv sync --group test

      - name: Run tests
        run: |
          uv run pytest

  test-postgresql-runtime:
    name: PostgreSQL Runtime (linux/amd64, Python 3.12)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cypherglot_test
          POSTGRES_USER: cypherglot
          POSTGRES_PASSWORD: cypherglot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cypherglot -d cypherglot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project
        run: |
          uv sync --group test

      - name: Run PostgreSQL runtime tests
        env:
          CYPHERGLOT_TEST_POSTGRES_DSN: dbname=cypherglot_test user=cypherglot password=cypherglot host=127.0.0.1 port=5432
        run: |
          uv run pytest tests/test_postgresql_runtime.py

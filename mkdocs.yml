site_name: CypherGlot
site_url: https://docs.humem.ai/cypherglot/
site_description: CypherGlot documentation for the Cypher-to-SQLGlot frontend compiler
site_author: humemai
repo_url: https://github.com/humemai/cypherglot
repo_name: humemai/cypherglot
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 humemai

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: cyan
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: cyan
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humemai/cypherglot
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/cypherglot/
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Guide:
      - Compiler Contract: guide/compiler-contract.md
      - Roadmap: guide/roadmap.md
  - Development:
      - Documentation: development/documentation.md
      - Release Workflow: development/release.md
